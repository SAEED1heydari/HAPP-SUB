name: AUTO HAPP SUB

on:
  workflow_dispatch:

  schedule:
    - cron: '0 */6 * * *'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Requirements
        run: |
          pip install -r requirements.txt

      - name: Run Cleaner
        run: |
          python cleaner.py

      - name: Commit Files
        run: |

          git config --global user.name "SAEED"
          git config --global user.email "saeed@users.noreply.github.com"

          git add clean.txt sub.txt

          git commit -m "AUTO UPDATE" || exit 0

          git push
